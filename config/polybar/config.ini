[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

include-file = ~/.config/polybar/theme.ini

[global/wm]
margin-top = 5
margin-bottom = 5

[bar/mybar]
width = 100%
height = 30
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

module-margin-right = 4

font-0 = DejaVu Sans:style=Regular:size=12;2
font-1 = Font Awesome 6 Free,Font Awesome 6 Free Solid:style=Solid:size=12;2

modules-left = xworkspaces xwindow
modules-right = pulseaudio temperature date time battery separator

override-redirect = false

tray-position = right
tray-padding = 2

cursor-click = pointer
cursor-scroll = ns-resize

include-file = ~/.config/polybar/modules.ini
