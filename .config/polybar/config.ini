[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[colors]
background = #222222
foreground = #ffffff
primary = #005577
secondary = #e60053
alert = #bd2c40

[global/wm]
margin-top = 5
margin-bottom = 5

[bar/mybar]
width = 100%
height = 28
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

;module-margin-left = 1
module-margin-right = 2

font-0 = Monospace:style=Regular:size=12;1
font-1 = Font Awesome 6 Free,Font Awesome 6 Free Solid:style=Solid:size=12;1

modules-left = i3 xwindow
modules-right = pulseaudio pacman-updates temperature date time battery separator

override-redirect = false

tray-position = right
tray-padding = 2

cursor-click = pointer
cursor-scroll = ns-resize

[module/separator]
type = custom/text
content = "| "

[module/spacer]
type = custom/text
content = " "

[module/xwindow]
type = internal/xwindow

format = <label>
label = %title:0:80:...%

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
;pin-workspaces = true

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${colors.primary}
label-focused-padding = 1

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = ${self.label-focused-padding}

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = ${self.label-focused-padding}

[module/mpd]
type = internal/mpd
format-online = <label-song> <icon-prev> <icon-stop> <toggle> <icon-next>

icon-prev = ⏮
icon-stop = ⏹
icon-play = ▶
icon-pause = ⏸
icon-next = ⏭

label-song-maxlen = 25
label-song-ellipsis = true

[module/cpu]
type = internal/cpu
interval = 2

format-prefix = " "
format = <label>
label = %percentage%%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

format-mounted-prefix = "🖴 "
format-label-mounted = <label-mounted>
label-mounted = %percentage_used%%

[module/memory]
type = internal/memory
interval = 2

format-prefix = " "
format = <label>
label = %percentage_used%%

[module/eth]
type = internal/network
interface = enp5s0
interval = 3.0

format-connected-prefix = " "
format-label-connected = <label-connected>
label-connected = Connected

format-disconnected-prefix = " "
format-disconnected = <label-disconnected>
label-disconnected = Disconnected

[module/wlan]
type = internal/network
interface = wlp1s0
interval = 3.0

format-connected-prefix = "📶 "
format-connected = <label-connected>
label-connected = %essid%

[module/date]
type = internal/date
interval = 20

format-prefix = "📅 "
format = <date>
date = %h %d, %Y

[module/time]
type = internal/date

format-prefix = "🕓 "
format = <label>
label = %time%
time = %I:%M %p

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

format-muted-prefix = " "
format-muted = <label-muted>
label-muted = Muted

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

format-full-prefix = "🔋 "
format-full = <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-framerate = 1000

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 85
interval = 2

format = <ramp> <label>
label = %temperature-c%

format-warn = <ramp> <label-warn>
label-warn = %temperature-c%

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 
ramp-4 = 

[module/pacman-updates]
type = custom/script
exec = checkupdates | wc -l
interval = 1000

format-prefix = " "
label = %output%

[module/updates-pacman-aurhelper]
type = custom/script
exec = ~/.config/polybar/scripts/updates-pacman-aurhelper.sh
interval = 600
